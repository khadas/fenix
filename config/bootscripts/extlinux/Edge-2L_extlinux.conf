LABEL Default
  LINUX /Image
  INITRD /initrd.img
  FDTDIR /dtb
  APPEND ${rootdev} rootflags=data=writeback rw rootfstype=ext4 ${bootargs} khadas_board=Edge-2L earlycon=uart8250,mmio32,0x2ad40000 console=ttyFIQ0 console=tty0 irqchip.gicv3_pseudo_nmi=0 ${partitiontype} fan=${fan_mode} lcd_panel=${lcd_panel} hwver=${hwver} usid=${usid} ${boot_user_args}
timeout  10
default Default
